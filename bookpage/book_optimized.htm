		width: 241px;
		z-index: 16;
		transition: all 0.4s;
	}

		display: none;
		background-color: #000;
		opacity: .4;
		position: fixed;
		top: 0;	right: 0; bottom: 0; left: 0;
		z-index: 8;
		cursor: pointer;
	}

		display: block;

	}

		display: block;
	}
