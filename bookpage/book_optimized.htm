	<style>
	/*  Above the fold begin    */
	/*  CSS category Base     */ /*  reset margin padding ...  */
	.grid-HeadLogo, body, figure, picture, img, figcaption, section, ul, li, input {
	margin: 0;
	padding: 0;
	}

	/*  CSS category Layout   */ /*  border display height media width ...  */

	.grid-HeadLogo {
		/* align-content: not used if only one row */
		align-items: center;
		display: flex;
		flex-flow: row nowrap; /* Shorthand for flex-direction and flex-wrap */
		height: 89px;
		justify-content: space-between;
		list-style: none;
		margin: 0 auto;
		padding: 8px 0 2px;
		width: 980px;
	}
	.HeadLogo__hb {
		background-color: #999;
		color: #fff;
		display: none;
		height: 36px;
		min-width: 46px;
		width: 26px;
	}
	.HeadLogo__img {
		background-image: url("images/ltd-logo-lg.jpg");
		background-position: 8px 0;
		background-repeat: no-repeat;
		height: 100%;
		width: 568px;
	}
	.HeadLogo__link {
		border-right: solid .6px #999;
		color: #666;
		font-family: sans-serif;
		font-size: 11px;
		height: 32px;
		line-height: 16px;
		margin: 1px 1px 1px 1px;
		padding: 1px 0 1px 6px;
		flex-shrink: 1;
		flex-grow: 0;
	}
	.HeadLogo__link a {
		cursor: pointer;
		white-space: nowrap;
	}
	.HeadLogo__cart {
		margin-left: 6px;
	}

body[data-brand="lsc"] .HeadLogo__link a { color: #7e2d3e; }
body[data-brand="ltd"] .HeadLogo__link a { color: #2ba6cb; }
body[data-brand="lsc"] .HeadLogo__link a:hover, a:focus { color: #5e0d1e; }
body[data-brand="ltd"] .HeadLogo__link a:hover, a:focus { color: #0078a0; }

body[data-brand="lsc"] .HeadLogo__img { background-image: url("images/lsc-logo-lg.jpg"); background-size: 380px 112px; }
body[data-brand="ltd"] .HeadLogo__img { background-image: url("images/ltd-logo-lg.jpg"); background-size: auto 88px; }
body[data-brand="lsc"] .grid-HeadLogo { height: 114px; }
body[data-brand="ltd"] .grid-HeadLogo { height: 89px; }

	.grid-HeadLogo > nav {
		QQQQflex: 0 1 auto; /* Shorthand for flex-grow, flex-shrink and flex-basis */
	}

	@media only screen and (max-width: 47.9375em) {
	/* small */
		.HeadLogo__link {
			display: none;
		}
	}
	@media only screen and (min-width:48em) and (max-width:61.1875em){
	/* medium */
		.HeadLogo__img {
			width: 40vw;
		}
	}
	@media only screen and (max-width:61.1875em){
	/* small and medium */
		.HeadLogo__hb {
			display: block;
		}
		.grid-HeadLogo {
			width: inherit;
		}
		body[data-brand="lsc"] .HeadLogo__img { background-image: url("images/lsc-logo-md-sm.jpg"); }
		body[data-brand="ltd"] .HeadLogo__img { background-image: url("images/ltd-logo-md.jpg"); background-size: auto auto; }
	}
	/*  Above the fold end      */
