<!DOCTYPE html>
<head>
<script
  src="https://code.jquery.com/jquery-2.2.4.min.js"
  integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44="
  crossorigin="anonymous"></script>
</head>
<body>
  <h1>Test Click capture on the body in Firefox.</h1>

  <ul>
    <li>
      <a class="refine-check" href="https://www.google.com">
        <input type="checkbox">Beige<span>(26)</span>
      </a>
    </li>
  </ul>
  <script>
    $( document ).ready(function(){
      //$('body').on('click', '.refine-check', function(e){
      var nRefine = document.getElementsByClassName("refine-check");
      if( nRefine ){
        for (var i = 0, ln = nRefine.length; i < ln; i++) {
            nRefine[i].firstElementChild.addEventListener("click", function( e ){
              e.preventDefault();
              setTimeout(function() { console.log( e.target ); e.target.checked = !e.target.checked; }, 120);
              //return false;
            }, true);
        }
      }
      $('.refine-check').on('click', function( e ){
        //this.stopPropegation();
        e.preventDefault();
        if(e.target.tagName === 'A') {
               e.preventDefault();
               e.stopPropagation();
        }
      });

    });
  </script>
</body>
</html>
