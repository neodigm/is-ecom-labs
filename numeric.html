
<!DOCTYPE html>
<html>
	<head>
		<title>Responsive Test Document</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
<hr>
<h6>HTML5 Text input keypress</h6>
<input class="js-num-only" type="text" placeholder="amount">

<hr>
<h6>HTML5 Numeric input keypress</h6>
<input class="js-num-only" type="number" placeholder="amount">


	</body>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.1/jquery.min.js"></script>

	<script>
		$(document).ready(function(){
            $(".js-num-only").on("keypress", function( e ){
                //  Currency input mask | numeric single dec
                var ch = e.which, dc = ( this.value.indexOf(".") !== -1 );
                 return (( ch >= 48 ) && ( ch <= 57)) || ( ch == 46 && !dc );
            });
		});
	</script>
</html>
