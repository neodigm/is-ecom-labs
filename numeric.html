
<!DOCTYPE html>
<html>
	<head>
		<title>Responsive Test Document</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
<style>
	input[type='number'] {
	  -moz-appearance:textfield;
	}

	input::-webkit-outer-spin-button,
	input::-webkit-inner-spin-button {
	  -webkit-appearance: none;
	}
</style>
<form novalidate>
<hr>
<!--
<h6>Currency (HTML5 Number input keypress)</h6>
<input id="input__currencty" class="js-currency-only" type="number" placeholder="amount" min="0" maxlength="17">
-->
<hr>
<h6>Numberic (HTML5 Number input keypress maxlength 17)</h6>
<input id="input__number"    class="js-number-only"   type="number" placeholder="amount" min="0" maxlength="17">
</form>
<hr>
<textarea id="fb" rows="12" cols="22"></textarea>

	</body>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.1/jquery.min.js"></script>

	<script>
		$(document).ready(function(){
			$(".js-number-only").on("keypress", function( e ){
				return js_number_only( this, e );
			});
			$(".js-currency-only").on("keypress", function( e ){
				return js_currency_only( this, e );
			});
			

			$(".js-number-only").on("input", function( e ){
				//  Android
				var v = $( this ).val();
console.log("check");
$( this )[0].value = "";
$("#fb").val( "INPvx " + v + "\n" + $("#fb").val()); 
					$( this ).val( v.replace(/\./g, "9") );
				if( v.indexOf(".") != -1 ){
$("#fb").val( "DOTvx " + v + "\n" + $("#fb").val());

				}

			});
		});
function js_currency_only( el, ev ){
	//  Currency input mask | numeric single dec pnt
	var inc =[0,1,2,3,4,5,6,7,8,46,99,118,120];
	inc = ( ev.ctrlKey ) ? inc : inc.splice( 0, inc.length -3 );
	var ch = ev.which, dc = ( el.value.indexOf(".") != -1 ), ml = ( $(el).val().length >= $(el).attr("maxlength"));
$("#fb").val( " ch | " + ch + " | dc | " + dc + "\n" + $("#fb").val());
console.log( " len = " + $(el).val().length + " max = " + $(el).attr("maxlength") );
console.log( " ch = " + ch + "  dc = " + dc + "  ml = " + ml + " ev = " + el.value );
console.log( " rt = " + (inc.indexOf( ch ) != -1 ) || (( ch >= 48 ) && ( ch <= 57 )) && (!ml) );
	if( ch === 46 && dc ) return false;
	return (inc.indexOf( ch ) != -1 ) || (( ch >= 48 ) && ( ch <= 57 ));
}
function js_number_only( el, ev ){
	//  Number input mask | whole num
	var inc =[0,1,2,3,4,5,6,7,8,99,118,120];
	inc = ( ev.ctrlKey ) ? inc : inc.splice( 0, inc.length -3 );
	var ch = ev.which, ml = ( $(el).val().length >= $(el).attr("maxlength"));
$("#fb").val( " ch | " + ch + " | ev.ctrlKey | " + ev.ctrlKey + "\n" + $("#fb").val() );
	return (inc.indexOf( ch ) != -1 ) || (( ch >= 48 ) && ( ch <= 57)) && (!ml);
}
	</script>
</html>
