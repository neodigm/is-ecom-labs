<!doctype html>

type="text/css">

  <script>
  $(function() {

$.ui.autocomplete.prototype._renderMenu = function( ul, items ) {
  var that = this;
  $.each( items, function( index, item ) {
    if( item.label.indexOf("<br>") != -1 ){
      var secn = item.label.split("<br>");
      item.label = secn[1];
      item.value = secn[1];
      oSecn = {label: secn[0], value: secn[0]};
      that._renderItemData( ul, oSecn );
    }
    that._renderItemData( ul, item );
  });
}

    var availableTags = [
      "Categories",
      "Brands",
      "Products",
      "PINS",
      "ActionScript<br>TypeScript",
      "AppleScript",
      "Asp",

      "Java",
      "JavaScript",
      "Lisp",
      "Perl",
      "PHP",
      "Python",
      "Ruby",
      "Scala",
      "Scheme"
    ];
    $( "#tags" ).autocomplete({
      source: availableTags
    });
  });
  </script>
</head>
